    const BMI_CUTOFFS = [
      [6.0, 16.4,17.7,16.2,17.5],[6.5,16.7,18.1,16.5,18.0],
      [7.0, 17.0,18.7,16.8,18.5],[7.5,17.4,19.2,17.2,19.0],
      [8.0, 17.8,19.7,17.6,19.4],[8.5,18.1,20.3,18.1,19.9],
      [9.0, 18.5,20.8,18.5,20.4],[9.5,18.9,21.4,19.0,21.0],
      [10.0,19.2,21.9,19.5,21.5],[10.5,19.6,22.5,20.0,22.1],
      [11.0,19.9,23.0,20.5,22.7],[11.5,20.3,23.6,21.1,23.3],
      [12.0,20.7,24.1,21.5,23.9],[12.5,21.0,24.7,21.9,24.5],
      [13.0,21.4,25.2,22.2,25.0],[13.5,21.9,25.7,22.6,25.6],

    // ── 出生体重百分位(g)（图5）─────────────────────────────────────
    // 男孩 [胎龄周, P3, P10, P25, P50, P75, P90, P97]
    const BW_MALE = [
      [24,356,434,520,624,737,846,962],   [25,444,538,642,766,901,1031,1166],
      [26,534,645,765,909,1064,1212,1366],[27,628,753,890,1053,1226,1390,1561],
      [28,724,865,1017,1196,1387,1566,1752],[29,825,980,1147,1343,1549,1742,1941],
      [30,935,1105,1286,1497,1718,1925,2136],[31,1059,1244,1440,1666,1902,2122,2346],
      [32,1205,1404,1614,1857,2108,2341,2578],[33,1376,1590,1814,2071,2337,2584,2830],
      [34,1576,1801,2036,2306,2585,2843,3104],[35,1803,2035,2279,2558,2847,3114,3384],
      [36,2053,2289,2536,2820,3114,3386,3662],[37,2308,2543,2790,3073,3366,3637,3912],
      [38,2515,2749,2993,3273,3562,3828,4098],[39,2643,2877,3121,3399,3685,3949,4215],
      [40,2723,2959,3203,3482,3767,4030,4294],[41,2784,3021,3266,3545,3830,4092,4355],
      [42,2839,3077,3323,3602,3887,4148,4410],

    // 女孩
    const BW_FEMALE = [
      [24,304,359,425,513,622,740,880],   [25,395,466,550,662,796,939,1105],
      [26,487,575,677,811,968,1132,1319], [27,582,686,806,960,1138,1321,1525],
      [28,680,799,936,1109,1306,1504,1723],[29,781,917,1070,1261,1474,1686,1916],
      [30,890,1042,1212,1419,1648,1872,2112],[31,1012,1181,1367,1591,1835,2071,2319],
      [32,1152,1338,1541,1782,2039,2285,2541],[33,1314,1518,1737,1993,2264,2519,2781],
      [34,1503,1722,1955,2225,2506,2768,3036],[35,1719,1951,2193,2472,2760,3028,3298],
      [36,1960,2197,2445,2727,3018,3286,3556],[37,2204,2439,2685,2964,3251,3515,3782],
      [38,2409,2640,2879,3153,3433,3691,3950],[39,2543,2770,3006,3275,3550,3803,4058],
      [40,2623,2849,3083,3349,3621,3872,4124],[41,2681,2905,3138,3402,3673,3921,4171],
      [42,2731,2954,3185,3448,3717,3963,4212],
    ];

    // ── 计算工具函数 ──────────────────────────────────────────────

    // 线性插值获取某月龄的参考行（七档值）
    function getRefRow(table, ageMonths) {
      if (ageMonths <= table[0][0]) return table[0];
      if (ageMonths >= table[table.length-1][0]) return table[table.length-1];
      for (let i = 0; i < table.length-1; i++) {
        if (ageMonths >= table[i][0] && ageMonths <= table[i+1][0]) {
          const t = (ageMonths - table[i][0]) / (table[i+1][0] - table[i][0]);
          return table[i].map((v, j) => j === 0 ? ageMonths : v + t*(table[i+1][j]-v));
        }
      }
      return table[table.length-1];
    }

    // 由七档数据插值计算 SDS
    function calcSDSFromRow(value, row) {
      const zs = [-3,-2,-1,0,1,2,3];
      const refs = row.slice(1);
      for (let i = 0; i < refs.length-1; i++) {
        if (value >= refs[i] && value <= refs[i+1]) {
          const t = (value-refs[i])/(refs[i+1]-refs[i]);
          return zs[i] + t*(zs[i+1]-zs[i]);
        }
      }
      if (value < refs[0]) return -3 + (value-refs[0])/(refs[1]-refs[0]);
      return 3 + (value-refs[refs.length-1])/(refs[refs.length-1]-refs[refs.length-2]);
    }

    // 正态分布 CDF → 百分位
    function zToP(z) {
      const p=0.3275911, a=[0.254829592,-0.284496736,1.421413741,-1.453152027,1.061405429];
      const sign = z<0?-1:1, x=Math.abs(z)/Math.sqrt(2);
      const t=1/(1+p*x);
      const y=1-((((a[4]*t+a[3])*t+a[2])*t+a[1])*t+a[0])*t*Math.exp(-x*x);
      return Math.min(99.9, Math.max(0.1, 50*(1+sign*y)));
    }

    // IGF-1：由百分位插值计算 SDS 和百分位
    function calcIGF1(value, ageYears, gender) {
      const tbl = gender==="male" ? IGF1_BOYS : IGF1_GIRLS;
      const age = Math.max(1, Math.min(19, Math.round(ageYears)));
      const row = tbl.find(r=>r[0]===age) || tbl[tbl.length-1];
      const [,p2_5,p5,p10,p25,p50,p75,p90,p95,p97_5] = row;
      const knownZ = [-1.96,-1.645,-1.28,-0.674,0,0.674,1.28,1.645,1.96];
      const knownP = [p2_5,p5,p10,p25,p50,p75,p90,p95,p97_5];
      let sds;
      if (value <= knownP[0]) sds = -1.96+(value-knownP[0])/(knownP[1]-knownP[0])*0.315;
      else if (value >= knownP[8]) sds = 1.96+(value-knownP[8])/(knownP[8]-knownP[7])*0.315;
      else {
        sds = 0;
        for (let i=0; i<knownP.length-1; i++) {
          if (value>=knownP[i] && value<=knownP[i+1]) {
            const t=(value-knownP[i])/(knownP[i+1]-knownP[i]);
            sds=knownZ[i]+t*(knownZ[i+1]-knownZ[i]); break;
          }
        }
      }
      return { sds: sds.toFixed(2), pct: zToP(sds).toFixed(1), p2_5,p10,p25,p50,p75,p90,p97_5 };
    }

    // BMI 分类
    function bmiCategory(bmi, ageYears, gender) {
      if (ageYears < 6) {
        if (bmi<14)  return {label:"偏瘦",color:"#3b82f6",detail:"BMI偏低"};
        if (bmi<18)  return {label:"正常",color:"#22c55e",detail:"BMI正常"};
        if (bmi<20)  return {label:"超重",color:"#f97316",detail:"BMI偏高"};
        return {label:"肥胖",color:"#ef4444",detail:"BMI显著偏高"};
      }
      const row = BMI_CUTOFFS.reduce((b,r)=>ageYears>=r[0]?r:b, BMI_CUTOFFS[0]);
      const ow = gender==="male"?row[1]:row[3];
      const ob = gender==="male"?row[2]:row[4];
      if (bmi<14)  return {label:"偏瘦",color:"#3b82f6",detail:"BMI偏低，建议关注营养"};
      if (bmi<ow)  return {label:"正常",color:"#22c55e",detail:"BMI在正常范围"};
      if (bmi<ob)  return {label:"超重",color:"#f97316",detail:`超重界值 ${ow} kg/m²`};
      return {label:"肥胖",color:"#ef4444",detail:`肥胖界值 ${ob} kg/m²，需积极干预`};
    }

    // 出生体重分类
    function bwCategory(bw, ga, gender) {
      const tbl = gender==="male"?BW_MALE:BW_FEMALE;
      const gaR = Math.max(24,Math.min(42,Math.round(ga)));
      const row = tbl.find(r=>r[0]===gaR)||tbl[tbl.length-1];
      const [,p3,p10,p25,p50,p75,p90,p97]=row;
      if (bw<p10)  return {cat:"小于胎龄儿（SGA）",color:"#ef4444",detail:`P10=${p10}g，出生体重低于P10`,p3,p10,p25,p50,p75,p90,p97};
      if (bw>p90)  return {cat:"大于胎龄儿（LGA）",color:"#8b5cf6",detail:`P90=${p90}g，出生体重高于P90`,p3,p10,p25,p50,p75,p90,p97};
      return {cat:"适于胎龄儿（AGA）",color:"#22c55e",detail:`P10~P90（${p10}~${p90}g）`,p3,p10,p25,p50,p75,p90,p97};
    }

    // 百分位标签
    function pLabel(p) {
      if (p<3)  return {label:"P3以下（-2SD以下）",  color:"#ef4444",bg:"#fef2f2"};
      if (p<15) return {label:"P3~P15（-2SD~-1SD）", color:"#f97316",bg:"#fff7ed"};
      if (p<50) return {label:"P15~P50（-1SD~均值）", color:"#84cc16",bg:"#f7fee7"};
      if (p<85) return {label:"P50~P85（均值~+1SD）", color:"#22c55e",bg:"#f0fdf4"};
      if (p<97) return {label:"P85~P97（+1SD~+2SD）", color:"#3b82f6",bg:"#eff6ff"};
      return     {label:"P97以上（+2SD以上）",         color:"#8b5cf6",bg:"#f5f3ff"};
    }

    function igfLabel(sds) {
      const s=parseFloat(sds);
      if (s<-2) return {label:"显著偏低",color:"#ef4444",detail:"建议评估GH-IGF轴功能"};
      if (s<-1) return {label:"偏低",    color:"#f97316",detail:"建议结合临床综合评估"};
      if (s< 1) return {label:"正常",    color:"#22c55e",detail:"IGF-1在正常范围内"};
      if (s< 2) return {label:"偏高",    color:"#3b82f6",detail:"建议结合临床综合评估"};
      return     {label:"显著偏高",       color:"#8b5cf6",detail:"需排除肢端肥大症等"};
    }

    // ── UI 组件 ──────────────────────────────────────────────────

    function SDSBar({sds}) {
      const v = Math.max(-3.5, Math.min(3.5, parseFloat(sds)||0));
      const pct = ((v+3.5)/7)*100;
      const col = Math.abs(v)>2?"#ef4444":Math.abs(v)>1?"#f97316":"#22c55e";
      return (
        <div style={{margin:"8px 0 4px"}}>
          <div style={{position:"relative",height:16,borderRadius:8,overflow:"hidden",background:"#e2e8f0"}}>
            <div style={{position:"absolute",left:"14.3%",right:"14.3%",top:0,bottom:0,background:"#fef9c3"}}/>
            <div style={{position:"absolute",left:"28.6%",right:"28.6%",top:0,bottom:0,background:"#dcfce7"}}/>
            {[-3,-2,-1,0,1,2,3].map(z=>(
              <div key={z} style={{position:"absolute",left:`${((z+3.5)/7)*100}%`,top:0,bottom:0,width:1,background:"rgba(0,0,0,0.12)"}}/>
            ))}
            <div style={{
              position:"absolute",left:`calc(${pct}% - 7px)`,top:"50%",transform:"translateY(-50%)",
              width:14,height:14,borderRadius:"50%",background:col,
              border:"2px solid white",boxShadow:"0 1px 4px rgba(0,0,0,0.25)",transition:"left 0.4s"
            }}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#94a3b8",marginTop:2}}>
            {["-3","-2","-1","均值","+1","+2","+3"].map((l,i)=><span key={i}>{l}</span>)}
          </div>
        </div>
      );
    }

    function Card({icon,title,value,unit,badge,bc,bg,detail,children}) {
      return (
        <div style={{background:bg||"#f8fafc",border:`1.5px solid ${bc||"#e2e8f0"}22`,
          borderLeft:`4px solid ${bc||"#94a3b8"}`,borderRadius:12,padding:"12px 16px",marginBottom:10}}>

    function Sec({title,icon,children,ac="#0ea5e9"}) {
      return (
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:7,borderBottom:`2px solid ${ac}22`,paddingBottom:8,marginBottom:12}}>

          </div>

        </div>
      );
    }

    const INP={width:"100%",padding:"9px 12px",fontSize:14,border:"1.5px solid #e2e8f0",
      borderRadius:8,background:"#f8fafc",color:"#1e293b",outline:"none",
      boxSizing:"border-box",fontFamily:"inherit"};

    function Tab({active,onClick,children}) {
      return (
        <button onClick={onClick} style={{flex:1,padding:"10px 0",fontSize:13,fontWeight:700,
          border:"none",background:active?"#0ea5e9":"transparent",color:active?"white":"#64748b",
          borderRadius:8,cursor:"pointer",transition:"all 0.2s",fontFamily:"inherit"}}>
          {children}
        </button>
      );
    }

    // ── 主应用 ────────────────────────────────────────────────────
    function App() {
      const [tab,setTab]       = useState("growth");
      const [gender,setGender] = useState("male");
      const [ageY,setAgeY]     = useState("");
      const [ageM,setAgeM]     = useState("");
      const [height,setHeight] = useState("");
      const [weight,setWeight] = useState("");
      const [fatherH,setFatherH]=useState("");
      const [motherH,setMotherH]=useState("");
      const [igf1,setIgf1]     = useState("");
      const [res,setRes]       = useState(null);

      const [nbGender,setNbGender]=useState("male");
      const [nbGA,setNbGA]     = useState("");
      const [nbBW,setNbBW]     = useState("");
      const [nbRes,setNbRes]   = useState(null);

      const calculate = useCallback(()=>{
        const mo = (parseInt(ageY)||0)*12+(parseInt(ageM)||0);
        if (!mo||mo<0||mo>216){alert("请输入有效年龄（0~18岁）");return;}
        const h=parseFloat(height), w=parseFloat(weight);
        const fh=parseFloat(fatherH), mh=parseFloat(motherH);
        const igfV=parseFloat(igf1);
        const yr=mo/12;
        const htTbl=gender==="male"?HT_MALE:HT_FEMALE;
        const wtTbl=gender==="male"?WT_MALE:WT_FEMALE;
        const r={mo};

        if(h>20&&h<250){
          const row=getRefRow(htTbl,mo);
          const sds=calcSDSFromRow(h,row);
          const p=zToP(sds);
          r.ht={sds:sds.toFixed(2),p:p.toFixed(1),...pLabel(p),
            ref:{n3:row[1].toFixed(1),n2:row[2].toFixed(1),n1:row[3].toFixed(1),
                 m:row[4].toFixed(1),p1:row[5].toFixed(1),p2:row[6].toFixed(1),p3:row[7].toFixed(1)}};
        }
        if(w>0.5&&w<300){
          const row=getRefRow(wtTbl,mo);
          const sds=calcSDSFromRow(w,row);
          const p=zToP(sds);
          r.wt={sds:sds.toFixed(2),p:p.toFixed(1),...pLabel(p),
            ref:{n3:row[1].toFixed(1),n2:row[2].toFixed(1),n1:row[3].toFixed(1),
                 m:row[4].toFixed(1),p1:row[5].toFixed(1),p2:row[6].toFixed(1),p3:row[7].toFixed(1)}};
        }
        if(h>20&&w>0.5){
          const bmi=w/((h/100)**2);
          r.bmi={val:bmi.toFixed(1),...bmiCategory(bmi,yr,gender)};
        }
        if(fh&&mh){
          const mid=gender==="male"?(fh+mh+13)/2:(fh+mh-13)/2;
          r.gen={mid:mid.toFixed(1),lo:(mid-8.5).toFixed(1),hi:(mid+8.5).toFixed(1)};
        }
        if(igfV>0&&yr>=1){
          r.igf={...calcIGF1(igfV,yr,gender)};
        }
        setRes(r);
      },[gender,ageY,ageM,height,weight,fatherH,motherH,igf1]);

      const calcNB = useCallback(()=>{
        const ga=parseFloat(nbGA),bw=parseFloat(nbBW);
        if(!ga||ga<24||ga>42){alert("胎龄请输入24~42周");return;}
        if(!bw||bw<200||bw>6000){alert("请输入有效出生体重(g)");return;}
        setNbRes(bwCategory(bw,ga,nbGender));
      },[nbGender,nbGA,nbBW]);

      const reset=()=>{setRes(null);setAgeY("");setAgeM("");setHeight("");setWeight("");setFatherH("");setMotherH("");setIgf1("");};

      const ageStr = res ? (()=>{const y=Math.floor(res.mo/12),m=res.mo%12;return y&&m?`${y}岁${m}个月`:y?`${y}岁`:`${m}个月`;})() : "";

      return (
        <div style={{minHeight:"100vh",fontFamily:"'PingFang SC','Helvetica Neue',sans-serif"}}>
          {/* Header */}
          <div style={{background:"linear-gradient(135deg,#0369a1,#0ea5e9,#0891b2)",padding:"18px 20px 22px",boxShadow:"0 4px 20px rgba(3,105,161,0.4)"}}>
            <div style={{maxWidth:700,margin:"0 auto",display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:42,height:42,background:"rgba(255,255,255,0.2)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>📏</div>
              <div>
                <div style={{fontSize:19,fontWeight:900,color:"white"}}>儿童生长发育评估工具</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.72)",marginTop:1}}>首都儿科研究所2005九省市标准 · WS/T 586</div>
              </div>
            </div>
          </div>

          <div style={{maxWidth:700,margin:"0 auto",padding:"16px 14px 48px"}}>
            {/* Tabs */}
            <div style={{display:"flex",gap:6,background:"white",padding:6,borderRadius:12,marginBottom:16,boxShadow:"0 2px 10px rgba(0,0,0,0.06)"}}>
              <Tab active={tab==="growth"}  onClick={()=>setTab("growth")}>📊 生长发育评估</Tab>
              <Tab active={tab==="newborn"} onClick={()=>setTab("newborn")}>👶 新生儿出生体重</Tab>
            </div>

            {/* ── 生长发育 Tab ── */}
            {tab==="growth"&&(
              <div style={{background:"white",borderRadius:16,padding:20,boxShadow:"0 4px 20px rgba(0,0,0,0.06)",marginBottom:14}}>
                <Sec title="基本信息" icon="👤" ac="#0ea5e9">
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div>
                      <label style={{display:"block",fontSize:12,fontWeight:600,color:"#475569",marginBottom:4}}>性别</label>
                      <select value={gender} onChange={e=>setGender(e.target.value)} style={INP}>
                        <option value="male">男</option><option value="female">女</option>
                      </select>
                    </div>
                    <div>
                      <label style={{display:"block",fontSize:12,fontWeight:600,color:"#475569",marginBottom:4}}>年龄</label>
                      <div style={{display:"flex",gap:6}}>
                        <div style={{position:"relative",flex:1}}>
                          <input type="number" min="0" max="18" placeholder="0" value={ageY}
                            onChange={e=>setAgeY(e.target.value)} style={{...INP,paddingRight:26}}/>
                          <span style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",fontSize:11,color:"#94a3b8"}}>岁</span>
                        </div>
                        <div style={{position:"relative",flex:1}}>
                          <input type="number" min="0" max="11" placeholder="0" value={ageM}
                            onChange={e=>setAgeM(e.target.value)} style={{...INP,paddingRight:26}}/>
                          <span style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",fontSize:11,color:"#94a3b8"}}>月</span>
                        </div>
                      </div>
                    </div>
                  </div>
                </Sec>

                <Sec title="身高 / 体重" icon="⚖️" ac="#10b981">
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div>
                      <label style={{display:"block",fontSize:12,fontWeight:600,color:"#475569",marginBottom:4}}>身高 (cm)</label>
                      <input type="number" placeholder="例：110.5" value={height} onChange={e=>setHeight(e.target.value)} style={INP}/>
                    </div>
                    <div>
                      <label style={{display:"block",fontSize:12,fontWeight:600,color:"#475569",marginBottom:4}}>体重 (kg)</label>
                      <input type="number" placeholder="例：18.5" value={weight} onChange={e=>setWeight(e.target.value)} style={INP}/>
                    </div>
                  </div>
                </Sec>

                <Sec title="遗传靶身高" icon="🧬" ac="#8b5cf6">
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div>
                      <label style={{display:"block",fontSize:12,fontWeight:600,color:"#475569",marginBottom:4}}>父亲身高 (cm)</label>
                      <input type="number" placeholder="例：175" value={fatherH} onChange={e=>setFatherH(e.target.value)} style={INP}/>
                    </div>
                    <div>
                      <label style={{display:"block",fontSize:12,fontWeight:600,color:"#475569",marginBottom:4}}>母亲身高 (cm)</label>
                      <input type="number" placeholder="例：162" value={motherH} onChange={e=>setMotherH(e.target.value)} style={INP}/>
                    </div>
                  </div>
                  <div style={{fontSize:11,color:"#94a3b8",marginTop:4}}>男孩 = (父+母+13)/2；女孩 = (父+母-13)/2；范围 ±8.5 cm</div>
                </Sec>

                <Sec title="IGF-1" icon="🔬" ac="#f59e0b">
                  <label style={{display:"block",fontSize:12,fontWeight:600,color:"#475569",marginBottom:4}}>
                    IGF-1 值 (ng/mL) <span style={{color:"#94a3b8",fontWeight:400}}>——适用年龄 ≥1 岁</span>
                  </label>
                  <input type="number" placeholder="例：250" value={igf1} onChange={e=>setIgf1(e.target.value)} style={INP}/>
                </Sec>

                <div style={{display:"flex",gap:10}}>
                  <button onClick={calculate} style={{flex:3,padding:"13px 0",background:"linear-gradient(135deg,#0ea5e9,#0284c7)",
                    color:"white",border:"none",borderRadius:10,fontSize:15,fontWeight:800,cursor:"pointer",
                    boxShadow:"0 4px 14px rgba(14,165,233,0.4)",fontFamily:"inherit"}}>🔍 计算评估</button>
                  <button onClick={reset} style={{flex:1,padding:"13px 0",background:"#f1f5f9",color:"#64748b",
                    border:"1.5px solid #e2e8f0",borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>重置</button>
                </div>
              </div>
            )}

            {/* ── 评估结果 ── */}
            {tab==="growth"&&res&&(
              <div style={{background:"white",borderRadius:16,padding:20,boxShadow:"0 4px 20px rgba(0,0,0,0.06)"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,paddingBottom:10,borderBottom:"2px solid #f0f9ff"}}>
                  <span style={{fontSize:18}}>📊</span>
                  <span style={{fontSize:16,fontWeight:900,color:"#0f172a"}}>评估结果</span>
                  <span style={{fontSize:12,color:"#94a3b8",marginLeft:4}}>年龄 {ageStr}</span>
                </div>

                {res.ht&&(
                  <Card icon="📐" title="身高评估" value={`SDS ${res.ht.sds}`}
                    badge={`P ${res.ht.p}`} bc={res.ht.color} bg={res.ht.bg} detail={res.ht.label}>
                    <SDSBar sds={res.ht.sds}/>
                    <div style={{fontSize:11,color:"#94a3b8",background:"#f8fafc",borderRadius:6,padding:"5px 10px"}}>
                      参考：-3SD={res.ht.ref.n3} | -2SD={res.ht.ref.n2} | -1SD={res.ht.ref.n1} | <b>均值={res.ht.ref.m}</b> | +1SD={res.ht.ref.p1} | +2SD={res.ht.ref.p2} | +3SD={res.ht.ref.p3} cm
                    </div>
                  </Card>
                )}

                {res.wt&&(
                  <Card icon="⚖️" title="体重评估" value={`SDS ${res.wt.sds}`}
                    badge={`P ${res.wt.p}`} bc={res.wt.color} bg={res.wt.bg} detail={res.wt.label}>
                    <SDSBar sds={res.wt.sds}/>
                    <div style={{fontSize:11,color:"#94a3b8",background:"#f8fafc",borderRadius:6,padding:"5px 10px"}}>
                      参考：-3SD={res.wt.ref.n3} | -2SD={res.wt.ref.n2} | -1SD={res.wt.ref.n1} | <b>均值={res.wt.ref.m}</b> | +1SD={res.wt.ref.p1} | +2SD={res.wt.ref.p2} | +3SD={res.wt.ref.p3} kg
                    </div>
                  </Card>
                )}

                {res.bmi&&(
                  <Card icon="🍎" title="BMI（WS/T 586）" value={res.bmi.val} unit="kg/m²"
                    badge={res.bmi.label} bc={res.bmi.color}
                    bg={res.bmi.label==="正常"?"#f0fdf4":res.bmi.label==="偏瘦"?"#eff6ff":"#fef2f2"}
                    detail={res.bmi.detail}/>
                )}

                {res.gen&&(
                  <div style={{background:"linear-gradient(135deg,#f5f3ff,#ede9fe)",border:"1.5px solid #c4b5fd",
                    borderLeft:"4px solid #8b5cf6",borderRadius:12,padding:"12px 16px",marginBottom:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                      <span style={{fontSize:16}}>🧬</span>
                      <span style={{fontSize:12,color:"#6d28d9",fontWeight:700}}>遗传靶身高（中值）</span>
                    </div>
                    <div style={{display:"flex",alignItems:"baseline",gap:8}}>
                      <span style={{fontSize:30,fontWeight:900,color:"#7c3aed",fontFamily:"monospace"}}>{res.gen.mid}</span>
                      <span style={{fontSize:13,color:"#94a3b8"}}>cm</span>
                    </div>
                    <div style={{marginTop:8,background:"rgba(255,255,255,0.6)",borderRadius:8,padding:"6px 10px",fontSize:13,color:"#6d28d9",fontWeight:600}}>
                      遗传范围：{res.gen.lo} ~ {res.gen.hi} cm（中值 ±8.5 cm）
                    </div>
                  </div>
                )}

                {res.igf&&(()=>{
                  const lbl=igfLabel(res.igf.sds);
                  return (
                    <Card icon="🔬" title="IGF-1 评估" value={`SDS ${res.igf.sds}`}
                      badge={lbl.label} bc={lbl.color}
                      bg={lbl.label==="正常"?"#f0fdf4":"#fff7ed"} detail={lbl.detail}>
                      <div style={{fontSize:11,color:"#94a3b8",background:"#f8fafc",borderRadius:6,padding:"5px 10px",marginTop:6}}>
                        参考（本年龄）：P2.5={res.igf.p2_5} | P10={res.igf.p10} | P25={res.igf.p25} | <b>P50={res.igf.p50}</b> | P75={res.igf.p75} | P90={res.igf.p90} | P97.5={res.igf.p97_5} ng/mL
                      </div>
                      <div style={{fontSize:11,color:"#94a3b8",marginTop:3}}>百分位：P {res.igf.pct}</div>
                    </Card>
                  );
                })()}
              </div>
            )}

            {/* ── 新生儿 Tab ── */}
            {tab==="newborn"&&(
              <div style={{background:"white",borderRadius:16,padding:20,boxShadow:"0 4px 20px rgba(0,0,0,0.06)"}}>
                <Sec title="新生儿出生体重评估" icon="👶" ac="#f59e0b">
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}>
                    <div>
                      <label style={{display:"block",fontSize:12,fontWeight:600,color:"#475569",marginBottom:4}}>性别</label>
                      <select value={nbGender} onChange={e=>setNbGender(e.target.value)} style={INP}>
                        <option value="male">男</option><option value="female">女</option>
                      </select>
                    </div>
                    <div>
                      <label style={{display:"block",fontSize:12,fontWeight:600,color:"#475569",marginBottom:4}}>胎龄（周）</label>
                      <input type="number" min="24" max="42" placeholder="如：40" value={nbGA}
                        onChange={e=>setNbGA(e.target.value)} style={INP}/>
                    </div>
                    <div>
                      <label style={{display:"block",fontSize:12,fontWeight:600,color:"#475569",marginBottom:4}}>出生体重（g）</label>
                      <input type="number" placeholder="如：3200" value={nbBW}
                        onChange={e=>setNbBW(e.target.value)} style={INP}/>
                    </div>
                  </div>
                  <div style={{fontSize:11,color:"#94a3b8",marginBottom:14}}>
                    &lt;P10 = 小于胎龄儿（SGA）；P10~P90 = 适于胎龄儿（AGA）；&gt;P90 = 大于胎龄儿（LGA）
                  </div>
                  <button onClick={calcNB} style={{width:"100%",padding:"13px 0",
                    background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"white",
                    border:"none",borderRadius:10,fontSize:15,fontWeight:800,cursor:"pointer",
                    fontFamily:"inherit",boxShadow:"0 4px 14px rgba(245,158,11,0.35)"}}>🔍 计算评估</button>
                </Sec>

                {nbRes&&(
                  <>
                    <div style={{background:`${nbRes.color}12`,border:`1.5px solid ${nbRes.color}44`,
                      borderLeft:`4px solid ${nbRes.color}`,borderRadius:12,padding:"14px 16px",marginBottom:10}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <span style={{fontSize:18}}>👶</span>
                          <span style={{fontSize:13,color:"#475569",fontWeight:700}}>出生体重分类</span>
                        </div>
                        <span style={{fontSize:13,fontWeight:800,color:nbRes.color,
                          background:`${nbRes.color}18`,padding:"3px 10px",borderRadius:20}}>{nbRes.cat}</span>
                      </div>
                      <div style={{fontSize:12,color:"#64748b"}}>{nbRes.detail}</div>
                    </div>
                    <div style={{fontSize:11,color:"#94a3b8",background:"#f8fafc",borderRadius:8,padding:"8px 12px"}}>
                      该胎龄参考（{nbGender==="male"?"男":"女"}）：P3={nbRes.p3}g | P10={nbRes.p10}g | P25={nbRes.p25}g | <b>P50={nbRes.p50}g</b> | P75={nbRes.p75}g | P90={nbRes.p90}g | P97={nbRes.p97}g
                    </div>
                  </>
                )}
              </div>
            )}

            <div style={{textAlign:"center",fontSize:11,color:"#94a3b8",marginTop:12,lineHeight:1.8}}>
              ⚕️ 仅供临床辅助参考，不作为最终诊断依据<br/>
              数据来源：首都儿科研究所九省市2005 / WS/T 586 / 中国IGF-1参考值 / 中国不同胎龄出生体重曲线
            </div>
          </div>
        </div>
      );
    }

    // 挂载 React 组件
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
